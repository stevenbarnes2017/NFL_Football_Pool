<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
</head>
<body class="bg-gray-100">
  <div class="container mx-auto mt-10">
    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
      <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

      <form method="POST" action="{{ url_for('main.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-4">
          <label class="block text-gray-700" for="username">Username</label>
          <input class="w-full p-2 border border-gray-300 rounded mt-1" type="text" name="username" id="username" required autofocus autocomplete="username">
        </div>
        <div class="mb-6">
          <label class="block text-gray-700" for="password">Password</label>
          <input class="w-full p-2 border border-gray-300 rounded mt-1" type="password" name="password" id="password" required autocomplete="current-password">
        </div>
        <button class="w-full bg-blue-500 text-white py-2 rounded" type="submit">Login</button>
      </form>

      {% with msgs = get_flashed_messages(with_categories=true) %}
        {% if msgs %}
          <div class="mt-4">
            {% for category, msg in msgs %}
              <p class="text-{{ 'red' if category=='danger' else 'green' }}-500">{{ msg }}</p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <div class="text-center mt-4">
        <p>Don't have an account? <a class="text-blue-500" href="{{ url_for('main.register') }}">Register</a></p>
      </div>
      <p class="mt-4 text-center">
        <a href="{{ url_for('main.forgot_password') }}" class="text-blue-500">I forgot my password</a>
      </p>
    </div>
  </div>
</body>
</html>
