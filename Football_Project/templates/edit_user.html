<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit User</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded shadow">
  <h1 class="text-2xl font-bold mb-4">Edit User</h1>

  <form method="POST" action="{{ url_for('admin.edit_user', user_id=user.id) }}" class="space-y-4">

    <div>
      <label for="username" class="block text-gray-700">Username</label>
      <input type="text" name="username" id="username" value="{{ user.username }}" required
             class="w-full p-2 border rounded">
    </div>

    <div>
      <label for="full_name" class="block text-gray-700">Full Name</label>
      <input type="text" name="full_name" id="full_name" value="{{ user.full_name or '' }}"
             class="w-full p-2 border rounded">
    </div>

    <div>
      <label for="email" class="block text-gray-700">Email</label>
      <input type="email" name="email" id="email" value="{{ user.email }}" required
             class="w-full p-2 border rounded">
    </div>

    <div>
      <label for="phone" class="block text-gray-700">Phone</label>
      <input type="text" name="phone" id="phone" value="{{ user.phone or '' }}"
             class="w-full p-2 border rounded">
    </div>

    <div>
      <label for="favorite_team" class="block text-gray-700">Favorite Team</label>
      <input type="text" name="favorite_team" id="favorite_team" value="{{ user.favorite_team or '' }}"
             class="w-full p-2 border rounded">
    </div>

    <div>
      <label for="new_password" class="block text-gray-700">New Password (optional)</label>
      <input type="password" name="new_password" id="new_password"
             class="w-full p-2 border rounded" placeholder="Leave blank to keep current password">
    </div>

    <div>
      <label class="inline-flex items-center">
        <input type="checkbox" name="is_admin" {% if user.is_admin %}checked{% endif %} class="form-checkbox">
        <span class="ml-2">Is Admin</span>
      </label>
    </div>

    <button type="submit"
            class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">
      Update User
    </button>

  </form>
</div>
</body>
</html>
