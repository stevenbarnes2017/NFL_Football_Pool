{% extends "base.html" %}
{% block title %}Invite Link{% endblock %}

{% block content %}
<div class="container mt-4 text-center">
    <h2>Invite Link Created</h2>
    <p class="text-muted">Share this link to invite others to your group.</p>

    <div class="mt-3">
        <input type="text" id="inviteLink" class="form-control text-center" value="{{ invite_url }}" readonly>
    </div>

    <div class="mt-3">
        <button class="btn btn-primary" onclick="copyInvite()">Copy Link</button>
    </div>

    <div class="mt-4">
        <a href="{{ url_for('main.groups') }}" class="btn btn-outline-secondary">
            Back to Groups
        </a>
    </div>
</div>

<script>
function copyInvite() {
    const input = document.getElementById("inviteLink");
    input.select();
    input.setSelectionRange(0, 99999);
    navigator.clipboard.writeText(input.value);
    alert("Invite link copied!");
}
</script>
{% endblock %}
