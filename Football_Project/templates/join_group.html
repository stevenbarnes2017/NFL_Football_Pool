{% extends "base.html" %}

{% block title %}Join Group{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-sm">
                <div class="card-header">
                    <h4 class="mb-0">Join a Group</h4>
                </div>

                <div class="card-body">
                    <form method="POST" action="{{ url_for('main.join_group') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">                        
                        <div class="mb-3">
                            <label for="slug" class="form-label">Group Slug</label>
                            <input 
                                type="text" 
                                name="slug" 
                                id="slug" 
                                class="form-control" 
                                placeholder="Enter group slug (e.g. office-pool)"
                                required
                            >
                            <small class="text-muted">
                                Ask the group owner for the slug.
                            </small>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('main.groups') }}" class="btn btn-secondary">
                                Cancel
                            </a>

                            <button type="submit" class="btn btn-primary">
                                Join Group
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
