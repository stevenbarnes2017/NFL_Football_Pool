<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
</head>
<body class="bg-gray-100">

<div class="container mx-auto mt-10">
  <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
    <h2 class="text-2xl font-bold mb-6 text-center">Forgot Password</h2>
    <p class="mb-4 text-center text-gray-600">Enter your email address below and we’ll send you a link to reset your password.</p>

    <form method="POST" action="{{ url_for('main.forgot_password') }}">
      <!-- CSRF Token -->
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-4">
        <label class="block text-gray-700" for="email">Email</label>
        <input class="w-full p-2 border border-gray-300 rounded mt-1" type="email" name="email" id="email" required>
      </div>
      <button class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600" type="submit">
        Send Reset Link
      </button>
    </form>

    <div class="text-center mt-4">
      <p>Remember your password? <a class="text-blue-500" href="{{ url_for('auth.login') }}">Login</a></p>
    </div>
  </div>
</div>

</body>
</html>
