{% extends "base.html" %}
{% block title %}Get Started{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm mx-auto" style="max-width: 700px;">
        <div class="card-body text-center p-5">
            <h2 class="mb-3">Welcome!</h2>
            <p class="text-muted mb-4">
                You are not part of a group yet. Choose how you would like to get started.
            </p>

            <div class="d-flex justify-content-center gap-3 flex-wrap">
                <a href="{{ url_for('main.join_group') }}" class="btn btn-success btn-lg">
                    Join an Existing Group
                </a>
                <a href="{{ url_for('main.create_group') }}" class="btn btn-primary btn-lg">
                    Create a New Group
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
