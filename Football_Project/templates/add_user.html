{% extends "base.html" %}

{% block title %}Add New User{% endblock %}

{% block content %}
<div class="container mx-auto mt-4">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-lg">
    <h2 class="text-3xl font-extrabold mb-4 text-center text-gray-900 tracking-tight">Add New User</h2>

    <form method="POST" action="{{ url_for('admin.add_user') }}">
      <!-- CSRF token -->
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <label for="username" class="block font-medium text-gray-700">Username</label>
        <input type="text" name="username" id="username" required
               class="w-full mt-1 p-2 border border-gray-300 rounded" autocomplete="username">
      </div>

      <div class="mt-3">
        <label for="email" class="block font-medium text-gray-700">Email</label>
        <input type="email" name="email" id="email" required
               class="w-full mt-1 p-2 border border-gray-300 rounded" autocomplete="email">
      </div>

      <div class="mt-3">
        <label for="password" class="block font-medium text-gray-700">Password</label>
        <input type="password" name="password" id="password" required
               class="w-full mt-1 p-2 border border-gray-300 rounded" autocomplete="new-password">
      </div>

      <div class="mt-4">
        <label class="inline-flex items-center">
          <!-- ensure unchecked sends 0 -->
          <input type="hidden" name="is_admin" value="0">
          <input type="checkbox" name="is_admin" value="1" class="form-checkbox">
          <span class="ml-2">Grant Admin Privileges</span>
        </label>
      </div>

      <div class="mt-6 text-center">
        <button type="submit" class="bg-green-500 hover:bg-green-600 text-white py-2 px-4 rounded-lg">
          Add User
        </button>
      </div>
    </form>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mt-4">
          {% for category, message in messages %}
            <p class="text-sm {{ 'text-red-600' if category == 'danger' else 'text-green-700' }}">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
  </div>
</div>
{% endblock %}
